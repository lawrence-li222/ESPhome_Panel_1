# ─────────────────────────────────────────────────────────────────────────────
# sensors/office-ceiling-fan.yaml — Home Assistant ↔ ESPHome state bridge
#
# Mirrors the HA fan entity onto local sensors so the LVGL UI
# stays in sync when the fan is controlled from HA, voice, or automations.
#
# Change `fan.office_ceiling_fan` to your actual HA entity_id everywhere.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  office_ceiling_fan: fan.office_ceiling_fan

sensor:
  - platform: homeassistant
    id: ha_office_ceiling_fan_speed
    entity_id: ${office_ceiling_fan}
    attribute: percentage
    on_value:
      then:
        - lvgl.slider.update:
            id: office_ceiling_fan_slider
            value: !lambda 'return x;'
        - lvgl.label.update:
            id: office_ceiling_fan_speed_label
            text: !lambda 'return "Fan Speed: " + to_string((int)x) + "%";'

binary_sensor:
  # Receives fan on/off state from HA
  - platform: homeassistant
    id: ha_office_ceiling_fan_state
    entity_id: ${office_fan_entity}
    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_on: ha_office_ceiling_fan_state
            then:
              - lvgl.widget.update:
                  id: status_dot
                  bg_color: 0x00BFFF
              - lvgl.label.update:
                  id: status_label
                  text: "ON"
              - lvgl.label.update:
                  id: toggle_label
                  text: "  TURN OFF"
              - lvgl.widget.update:
                  id: btn_toggle
                  bg_color: 0xCC3300
            else:
              - lvgl.widget.update:
                  id: status_dot
                  bg_color: 0x444444
              - lvgl.label.update:
                  id: status_label
                  text: "OFF"
              - lvgl.label.update:
                  id: toggle_label
                  text: "  TURN ON"
              - lvgl.widget.update:
                  id: btn_toggle
                  bg_color: 0x007700
